<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Index</title>

    <!-- Normalize -->
    <link rel="stylesheet" href="css/normalize.css" />

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main>
      <section class="intro">
        <h1 class="intro__title">
          What Six Flags Great Adventure Coaster Are You?
        </h1>
        <div class="intro__form">
          <label class="intro__form-label" for="birthday-selector"
            >Enter your birthday:</label
          >
          <input class="intro__form-input" type="date" id="birthday-selector" />
          <button class="intro__form-submit" type="submit">Submit</button>
        </div>
        <div class="intro__help">
          <button class="intro__help-button">Help</button>
        </div>
      </section>

      <section class="coaster">
        <div class="signs signs--group1">
          <button class="sign sign--aries">
            <span class="sign__icon">&#9800;</span>
            <span class="sign__name">Aries</span>
          </button>
          <button class="sign sign--taurus">
            <span class="sign__icon">&#9801;</span>
            <span class="sign__name">Taurus</span>
          </button>
          <button class="sign sign--gemini">
            <span class="sign__icon">&#9802;</span>
            <span class="sign__name">Gemini</span>
          </button>
          <button class="sign sign--cancer">
            <span class="sign__icon">&#9803;</span>
            <span class="sign__name">Cancer</span>
          </button>
          <button class="sign sign--leo">
            <span class="sign__icon">&#9804;</span>
            <span class="sign__name">Leo</span>
          </button>
          <button class="sign sign--virgo">
            <span class="sign__icon">&#9805;</span>
            <span class="sign__name">Virgo</span>
          </button>
        </div>

        <div class="coaster__info">
          <h2 class="coaster__title">Coaster Title</h2>
          <div class="coaster__content">
            <div class="coaster__content-1">
              <div class="meters">
                <div class="meter meter--inversions">
                  <h3 class="meter__label">Inversions</h3>
                  <div class="meter__track">
                    <div class="meter__bar meter__bar--inversions"></div>
                  </div>
                  <p class="meter__value">0</p>
                </div>
                <div class="meter meter--speed">
                  <h3 class="meter__label">Top Speed</h3>
                  <div class="meter__track">
                    <div class="meter__bar meter__bar--speed"></div>
                  </div>
                  <p class="meter__value">0</p>
                </div>
                <div class="meter meter--height">
                  <h3 class="meter__label">Height</h3>
                  <div class="meter__track">
                    <div class="meter__bar meter__bar--height"></div>
                  </div>
                  <p class="meter__value">0</p>
                </div>
              </div>
              <p class="coaster-description">Coaster description goes here.</p>
            </div>

            <div class="coaster__content-2">
              <img class="coaster__image" src="" alt="Roller Coaster Image" />
              <p class="coaster__dates">Sign Date Range</p>
            </div>
          </div>

          <div class="sliders"></div>
        </div>

        <div class="signs signs--group2">
          <button class="sign sign--libra">
            <span class="sign__icon">&#9806;</span>
            <span class="sign__name">Libra</span>
          </button>
          <button class="sign sign--scorpio">
            <span class="sign__icon">&#9807;</span>
            <span class="sign__name">Scorpio</span>
          </button>
          <button class="sign sign--sagittarius">
            <span class="sign__icon">&#9808;</span>
            <span class="sign__name">Sagittarius</span>
          </button>
          <button class="sign sign--capricorn">
            <span class="sign__icon">&#9809;</span>
            <span class="sign__name">Capricorn</span>
          </button>
          <button class="sign sign--aquarius">
            <span class="sign__icon">&#9810;</span>
            <span class="sign__name">Aquarius</span>
          </button>
          <button class="sign sign--pisces">
            <span class="sign__icon">&#9811;</span>
            <span class="sign__name">Pisces</span>
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
